<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANTRAX EMPIRE</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:#000;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:500px;
    background:#050505;
    border:1px solid #222;
    border-radius:35px;
    padding:50px 30px;
    text-align:center;
    box-shadow:
        0 0 60px rgba(0,0,0,.8),
        0 0 120px rgba(0,200,83,.08);
}

.logo-wrap{
    width:180px;
    height:180px;
    margin:0 auto 35px;
    border-radius:50%;
    overflow:hidden;
    border:4px solid #00c853;
    box-shadow:
        0 0 25px rgba(0,200,83,.7),
        0 0 60px rgba(0,200,83,.25);
}

.logo-img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.badge{
    display:inline-block;
    background:#061b0d;
    color:#00d26a;
    border:1px solid #0c5d2f;
    padding:14px 28px;
    border-radius:999px;
    font-size:18px;
    font-weight:700;
    letter-spacing:2px;
    margin-bottom:28px;
}

.nequi-pill{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:#12001f;
    border:1px solid #6d28d9;
    border-radius:999px;
    padding:16px 30px;
    margin-bottom:35px;
}

.nequi-dot{
    width:14px;
    height:14px;
    border-radius:50%;
    background:#b66cff;
}

.nequi-pill span{
    color:#b66cff;
    font-size:18px;
    font-weight:700;
}

p{
    font-size:20px;
    line-height:1.8;
    color:#c5c5c5;
    margin-bottom:40px;
}

.btn{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    text-decoration:none;
    color:#fff;
    font-size:22px;
    font-weight:700;
    padding:24px;
    border-radius:22px;
    background:linear-gradient(135deg,#0088cc,#0056d6);
    box-shadow:
        0 0 25px rgba(0,136,204,.6),
        0 0 50px rgba(0,136,204,.2);
    transition:.2s;
}

.btn:hover{
    transform:translateY(-3px);
}

.btn svg{
    width:28px;
    height:28px;
    fill:white;
}

.footer-note{
    margin-top:25px;
    color:#8d8d8d;
    font-size:18px;
}

@media(max-width:600px){

    .card{
        padding:40px 25px;
    }

    .logo-wrap{
        width:170px;
        height:170px;
    }

    .badge{
        font-size:16px;
    }

    .nequi-pill span{
        font-size:16px;
    }

    p{
        font-size:18px;
    }

    .btn{
        font-size:20px;
        padding:22px;
    }

    .footer-note{
        font-size:16px;
    }
}

</style>
</head>
<body>

<div class="card">

    <div class="logo-wrap">
        <img
            src="https://i.ibb.co/HDVTMBBk/ANTRAX.png"
            alt="ANTRAX EMPIRE"
            class="logo-img">
    </div>

    <div class="badge">
        ANTRAX OFICIAL
    </div>

    <div class="nequi-pill">
        <div class="nequi-dot"></div>
        <span>FACTURA CON TU NEQUI</span>
    </div>

    <p>
        Te enseño a ganar 2 palos diarios con tu NEQUI.
        Para ver toda la información, únete al grupo
        de Telegram presionando el botón de abajo 👇
    </p>

    <a
        href="https://t.me/+-ZkFXRE8dao3ZDgx"
        class="btn"
        target="_blank">

        <svg viewBox="0 0 24 24">
            <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.96 6.504-1.356 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
        </svg>

        Unirme al grupo de Telegram
    </a>

    <div class="footer-note">
        Solo desliza, únete y entérate de todo 👆
    </div>

</div>

</body>
</html>
